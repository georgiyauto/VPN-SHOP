  .sub-card{background:var(--tg-theme-secondary-bg-color,#1e1e22);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .sub-avatar{width:46px;height:46px;background:linear-gradient(135deg,#5856d6,#2979ff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .sub-info{flex:1;min-width:0}
  .sub-name{font-size:15px;font-weight:600}
  .sub-expires{font-size:13px;opacity:.55;margin-top:2px}
  .section-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.4;margin-bottom:10px;padding-left:2px}
  .platform-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px}
  .platform-btn{background:var(--tg-theme-secondary-bg-color,#1e1e22);border:2px solid transparent;border-radius:14px;padding:10px 4px 8px;text-align:center;cursor:pointer;transition:all .15s}
  .platform-btn.active{border-color:#2979ff;background:rgba(41,121,255,.13)}
  .picon{height:28px;display:flex;align-items:center;justify-content:center;margin-bottom:5px}
  .picon img{width:26px;height:26px;object-fit:contain}
  .picon svg{width:24px;height:24px}
  .platform-btn span{font-size:11px;opacity:.75;display:block}
  .apps-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
  .app-card{background:var(--tg-theme-secondary-bg-color,#1e1e22);border:2px solid transparent;border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:all .15s}
  .app-card.selected{border-color:#2979ff;background:rgba(41,121,255,.1)}
  .app-icon-wrap{width:52px;height:52px;border-radius:14px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .app-icon-wrap img.full{width:52px;height:52px;object-fit:cover;display:block;border-radius:14px}
  .logo-bg{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center}
  .logo-bg img{width:36px;height:36px;object-fit:contain}
  .app-name{font-size:15px;font-weight:600}
  .app-tag{font-size:12px;opacity:.5;margin-top:2px}
  .rec-badge{margin-left:auto;background:rgba(52,199,89,.18);color:#34c759;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .steps-list{margin-bottom:20px}
  .step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .step:last-child{border-bottom:none}
  .step-num{width:24px;height:24px;background:#2979ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px}
  .step-title{font-size:14px;font-weight:600;margin-bottom:3px}
  .step-desc{font-size:13px;opacity:.65;line-height:1.45}
  .step-link{display:inline-block;margin-top:8px;background:#2979ff;color:#fff;text-decoration:none;padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600}
  .add-btn-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 22px;background:var(--tg-theme-bg-color,#111114);border-top:1px solid rgba(255,255,255,.07)}
  #add-btn{width:100%;background:#2979ff;color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s}
  #add-btn:disabled{opacity:.35;cursor:not-allowed}
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.82);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
  #toast.show{opacity:1}
</style>

function appIconHtml(id) {
  if (ICON_FULL[id]) {
    return '<img class="full" src="'+ICON_FULL[id]+'">';
  }
  var lg = ICON_LOGO[id];
  if (lg) {
    return '<div class="logo-bg" style="background:'+lg.bg+'"><img src="'+lg.src+'"></div>';
  }
  var letter = (id||'?')[0].toUpperCase();
  return '<div class="logo-bg" style="background:#333;color:#fff;font-size:22px;font-weight:700">'+letter+'</div>';
}

function setPlatform(p,btn){
  currentPlatform=p;
  document.querySelectorAll('.platform-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  selectedApp=null;
  renderApps();
  renderSteps();
  updateBtn();
}

function renderApps(){
  var apps=APPS[currentPlatform]||[];
  document.getElementById('apps-grid').innerHTML=apps.map(function(app){
    return '<div class="app-card'+(selectedApp===app.id?' selected':'')+'" data-id="'+app.id+'" onclick="selectApp(\''+app.id+'\')">'
      +'<div class="app-icon-wrap">'+appIconHtml(app.id)+'</div>'
      +'<div style="flex:1"><div class="app-name">'+app.name+'</div><div class="app-tag">'+app.tag+'</div></div>'
      +(app.recommended?'<span class="rec-badge">\u2605 \u0422\u043e\u043f</span>':'')
      +'</div>';
  }).join('');
  var rec=apps.find(function(a){return a.recommended;});
  if(rec) selectApp(rec.id);
}

function selectApp(id){
  selectedApp=id;
  document.querySelectorAll('.app-card').forEach(function(c){c.classList.toggle('selected',c.dataset.id===id);});
  renderSteps();
  updateBtn();
}

  else if(appId==='hiddify') extra=[{title:'\u0414\u043e\u0431\u0430\u0432\u044c\u0442\u0435 \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0443',desc:'Hiddify \u0434\u043e\u0431\u0430\u0432\u0438\u0442 \u0441\u0435\u0440\u0432\u0435\u0440\u044b \u0430\u0432\u0442\u043e\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u0438.'},{title:'\u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0438\u0442\u0435\u0441\u044c',desc:'\u041d\u0430\u0436\u043c\u0438\u0442\u0435 \u043a\u043d\u043e\u043f\u043a\u0443 \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u044f.'}];
  else if(appId==='v2rayng') extra=[{title:'\u0414\u043e\u0431\u0430\u0432\u044c\u0442\u0435 \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0443',desc:'\u2261 > Subscription settings > + > \u0432\u0441\u0442\u0430\u0432\u044c\u0442\u0435 \u0441\u0441\u044b\u043b\u043a\u0443.'},{title:'\u041e\u0431\u043d\u043e\u0432\u0438\u0442\u0435 \u0441\u0435\u0440\u0432\u0435\u0440\u044b',desc:'\u2261 > Update subscriptions > \u0432\u044b\u0431\u0435\u0440\u0438\u0442\u0435 > \u25B6.'}];
  else if(appId==='singbox') extra=[{title:'\u0414\u043e\u0431\u0430\u0432\u044c\u0442\u0435 \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0443',desc:'+ > Remote profile > \u0432\u0441\u0442\u0430\u0432\u044c\u0442\u0435 \u0441\u0441\u044b\u043b\u043a\u0443.'},{title:'\u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0438\u0442\u0435\u0441\u044c',desc:'\u0412\u043a\u043b\u044e\u0447\u0438\u0442\u0435 VPN.'}];
  else if(appId==='v2rayn') extra=[{title:'\u0414\u043e\u0431\u0430\u0432\u044c\u0442\u0435 \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0443',desc:'\u041f\u043e\u0434\u043f\u0438\u0441\u043a\u0438 > \u0423\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 > \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c.'},{title:'\u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0438\u0442\u0435\u0441\u044c',desc:'\u041f\u043e\u0434\u043f\u0438\u0441\u043a\u0438 > \u041e\u0431\u043d\u043e\u0432\u0438\u0442\u044c.'}];
  else extra=[{title:'\u0414\u043e\u0431\u0430\u0432\u044c\u0442\u0435 \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0443',desc:'\u0412\u0441\u0442\u0430\u0432\u044c\u0442\u0435 \u0441\u0441\u044b\u043b\u043a\u0443 \u0432 \u043f\u0440\u0438\u043b\u043e\u0436\u0435\u043d\u0438\u0435.'},{title:'\u041f\u043e\u0434\u043a\u043b\u044e\u0447\u0438\u0442\u0435\u0441\u044c',desc:'\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u0441\u0435\u0440\u0432\u0435\u0440.'}];
  return [installStep].concat(extra);
}

function renderSteps(){
  var label=document.getElementById('steps-label');
  var list=document.getElementById('steps-list');
  if(!selectedApp){label.style.display='none';list.innerHTML='';return;}
  label.style.display='block';
  var steps=getSteps(currentPlatform,selectedApp);
  list.innerHTML=steps.map(function(s,i){
    return '<div class="step"><div class="step-num">'+(i+1)+'</div><div>'
      +'<div class="step-title">'+s.title+'</div>'
      +'<div class="step-desc">'+s.desc+'</div>'
      +(s.link?'<a class="step-link" href="'+s.link+'" target="_blank">'+s.link_text+'</a>':'')
      +'</div></div>';
  }).join('');
}

function updateBtn(){
  var btn=document.getElementById('add-btn');
  if(!selectedApp){btn.disabled=true;btn.textContent='+ \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0443';return;}
  btn.disabled=false;
  var isDesktop=currentPlatform==='windows'||currentPlatform==='other';
  var apps=APPS[currentPlatform]||[];
  var app=apps.find(function(a){return a.id===selectedApp;});
  btn.textContent=isDesktop?'\u{1F4CB} \u0421\u043a\u043e\u043f\u0438\u0440\u043e\u0432\u0430\u0442\u044c \u0441\u0441\u044b\u043b\u043a\u0443':'+ \u0414\u043e\u0431\u0430\u0432\u0438\u0442\u044c \u0432 '+(app?app.name:'\u043f\u0440\u0438\u043b\u043e\u0436\u0435\u043d\u0438\u0435');
}

function getDeepLink(appId){
  var enc=encodeURIComponent(SUB_URL);
  if(appId==='happ')      return 'happ://add/'+SUB_URL;
  if(appId==='hiddify')   return 'hiddify://import/'+SUB_URL;
  if(appId==='v2rayng')   return 'v2rayng://install-sub?url='+enc;
  if(appId==='singbox')   return 'sing-box://import-remote-profile?url='+enc;
  if(appId==='streisand') return 'streisand://import/'+enc;
  return null;
}

function addSubscription(){
  if(!selectedApp) return;
  var isDesktop=currentPlatform==='windows'||currentPlatform==='other';
  if(isDesktop){
    if(SUB_URL){
      if(navigator.clipboard){navigator.clipboard.writeText(SUB_URL).then(function(){showToast('\u2705 \u0421\u0441\u044b\u043b\u043a\u0430 \u0441\u043a\u043e\u043f\u0438\u0440\u043e\u0432\u0430\u043d\u0430!');}).catch(function(){showToast(SUB_URL);});}
      else showToast(SUB_URL);
    } else showToast('\u26A0\uFE0F \u0421\u0441\u044b\u043b\u043a\u0430 \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u0430');
    return;
  }
  var dl=getDeepLink(selectedApp);
  if(!dl||!SUB_URL){showToast('\u26A0\uFE0F \u0421\u0441\u044b\u043b\u043a\u0430 \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u0430');return;}
  try{window.open(dl,'_blank');}catch(e){window.location.href=dl;}
  setTimeout(function(){showToast('\u{1F4F1} \u041e\u0442\u043a\u0440\u044b\u0432\u0430\u044e...');},200);
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

async function loadSubInfo(){
  if(!SUB_TOKEN&&!SUB_URL){
    document.getElementById('sub-name').textContent='VPN \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0430';
    document.getElementById('sub-expires').textContent='\u0421\u0441\u044b\u043b\u043a\u0430 \u043d\u0435 \u0443\u043a\u0430\u0437\u0430\u043d\u0430';
    return;
  }
  var token=SUB_TOKEN||(SUB_URL.split('/sub/')[1]||'').split('?')[0];
  if(!token){
    document.getElementById('sub-name').textContent='VPN \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0430';
    document.getElementById('sub-expires').textContent='\u041f\u043e\u0434\u043f\u0438\u0441\u043a\u0430 \u0430\u043a\u0442\u0438\u0432\u043d\u0430';
    return;
  }
  try{
    var r=await fetch(ORIGIN+'/sub-info/'+token);
    if(r.ok){
      var d=await r.json();
      document.getElementById('sub-name').textContent=d.plan_name||'VPN \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0430';
      if(d.expires_at){
        var exp=new Date(d.expires_at);
        var days=Math.ceil((exp-Date.now())/86400000);
        document.getElementById('sub-expires').textContent=days>0?'\u0418\u0441\u0442\u0435\u043a\u0430\u0435\u0442 \u0447\u0435\u0440\u0435\u0437 '+days+' \u0434\u043d. \u2014 '+exp.toLocaleDateString('ru'):'\u041f\u043e\u0434\u043f\u0438\u0441\u043a\u0430 \u0438\u0441\u0442\u0435\u043a\u043b\u0430';
      } else {
        document.getElementById('sub-expires').textContent='\u0411\u0435\u0441\u0441\u0440\u043e\u0447\u043d\u0430\u044f';
      }
    } else {
      document.getElementById('sub-name').textContent='VPN \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0430';
      document.getElementById('sub-expires').textContent='\u041f\u043e\u0434\u043f\u0438\u0441\u043a\u0430 \u0430\u043a\u0442\u0438\u0432\u043d\u0430';
    }
  } catch(e) {
    document.getElementById('sub-name').textContent='VPN \u043f\u043e\u0434\u043f\u0438\u0441\u043a\u0430';
    document.getElementById('sub-expires').textContent='\u041f\u043e\u0434\u043f\u0438\u0441\u043a\u0430 \u0430\u043a\u0442\u0438\u0432\u043d\u0430';
  }
}

renderApps();
loadSubInfo();
</script>
